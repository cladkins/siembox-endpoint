name: release

# Builds native packages on each OS's own runner:
#   - Linux:   .deb / .rpm / archives  (goreleaser + nfpm)
#   - macOS:   .pkg                     (pkgbuild, universal binary)
#   - Windows: .msi                     (WiX)
#
# On a version tag (v*) the packages are attached to the GitHub Release.
# On pull_request / manual dispatch they are uploaded as workflow artifacts so
# the build can be verified without cutting a release.

on:
  push:
    tags: ['v*']
  pull_request:
    paths:
      - '**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: ${{ startsWith(github.ref, 'refs/tags/') && 'release --clean' || 'release --snapshot --clean' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            dist/*.deb
            dist/*.rpm
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt

  macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: build .pkg
        run: |
          VERSION="0.0.0"
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then VERSION="${GITHUB_REF_NAME#v}"; fi
          echo "building version $VERSION"
          VERSION="$VERSION" bash packaging/darwin/build-pkg.sh
      - uses: actions/upload-artifact@v4
        with:
          name: macos-pkg
          path: dist/*.pkg
      - name: attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.pkg

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: build .msi
        shell: pwsh
        run: |
          $version = "0.0.0"
          if ($env:GITHUB_REF_TYPE -eq "tag") { $version = $env:GITHUB_REF_NAME -replace '^v','' }
          Write-Host "building version $version"
          packaging\windows\build-msi.ps1 -Version $version
      - uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: dist/*.msi
      - name: attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.msi
