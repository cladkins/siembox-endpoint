title: YARA Signature Match On File
id: siembox-yara-file-match
status: experimental
description: A file in a monitored directory matched a YARA signature. The matched rule name(s) are in the "matches" field and the file in "path".
author: SIEMBox Endpoint
level: high
tags:
  - attack.execution
  - attack.t1204
logsource:
  category: file_event
detection:
  selection:
    query: yara_scan
  filter:
    action: removed
  condition: selection and not filter
